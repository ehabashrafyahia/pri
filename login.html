<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - منصة الدراسات الاجتماعية</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col justify-between">

    <!-- شريط الملاحة -->
    <nav class="flex justify-between items-center px-6 md:px-12 py-5 border-b border-slate-800">
        <a href="index.html" class="flex items-center space-x-3 space-x-reverse">
            <div class="w-10 h-10 bg-amber-600 rounded-lg flex items-center justify-center text-xl font-bold">🌍</div>
            <span class="text-xl font-bold tracking-wide">منصة <span class="text-amber-500">الدراسات الاجتماعية</span></span>
        </a>
        <a href="index.html" class="text-slate-400 hover:text-white transition-all text-sm font-medium">
            ← العودة للرئيسية
        </a>
    </nav>

    <!-- بطاقة تسجيل الدخول والتسجيل -->
    <main class="container mx-auto px-4 py-12 flex justify-center items-center flex-1">
        <div class="bg-slate-800/60 border border-slate-700/60 rounded-2xl p-8 w-full max-w-md shadow-2xl backdrop-blur-sm">
            
            <!-- أزرار التبديل (دخول / جديد) -->
            <div class="flex border-b border-slate-700 mb-6">
                <button id="tab-login" onclick="switchTab('login')" class="w-1/2 py-3 text-center font-bold text-amber-500 border-b-2 border-amber-500 transition-all">
                    تسجيل الدخول
                </button>
                <button id="tab-register" onclick="switchTab('register')" class="w-1/2 py-3 text-center font-bold text-slate-400 hover:text-slate-200 transition-all">
                    حساب جديد
                </button>
            </div>

            <!-- 1. نموذج تسجيل الدخول -->
            <form id="form-login" class="space-y-5" onsubmit="handleAuth(event, 'dashboard.html')">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">رقم الهاتف أو كود الطالب</label>
                    <input type="text" required placeholder="أدخل رقم الهاتف أو الكود" 
                           class="w-full bg-slate-900/80 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-amber-500 transition-all">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">كلمة السر</label>
                    <input type="password" required placeholder="••••••••" 
                           class="w-full bg-slate-900/80 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-amber-500 transition-all">
                </div>

                <button type="submit" class="w-full bg-amber-600 hover:bg-amber-700 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg shadow-amber-600/20 active:scale-[0.99]">
                    دخول إلى المنصة 🚀
                </button>
            </form>

            <!-- 2. نموذج إنشاء حساب جديد -->
            <form id="form-register" class="space-y-4 hidden" onsubmit="handleAuth(event, 'dashboard.html')">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1.5">اسم الطالب الثلاثي</label>
                    <input type="text" required placeholder="أدخل اسمك بالكامل" 
                           class="w-full bg-slate-900/80 border border-slate-700 rounded-xl px-4 py-2.5 text-white placeholder-slate-500 focus:outline-none focus:border-amber-500 transition-all">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1.5">الصف الدراسي</label>
                    <select required class="w-full bg-slate-900/80 border border-slate-700 rounded-xl px-4 py-2.5 text-slate-300 focus:outline-none focus:border-amber-500 transition-all">
                        <option value="" disabled selected>اختر الصف الدراسي</option>
                        <option value="p4">الرابع الابتدائي</option>
                        <option value="p5">الخامس الابتدائي</option>
                        <option value="p6">السادس الابتدائي</option>
                        <option value="prep1">الأول الإعدادي</option>
                        <option value="prep2">الثاني الإعدادي</option>
                        <option value="prep3">الثالث الإعدادي</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1.5">رقم هاتف الطالب</label>
                    <input type="tel" required placeholder="01xxxxxxxxx" 
                           class="w-full bg-slate-900/80 border border-slate-700 rounded-xl px-4 py-2.5 text-white placeholder-slate-500 focus:outline-none focus:border-amber-500 transition-all">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1.5">رقم هاتف ولي الأمر</label>
                    <input type="tel" required placeholder="01xxxxxxxxx" 
                           class="w-full bg-slate-900/80 border border-slate-700 rounded-xl px-4 py-2.5 text-white placeholder-slate-500 focus:outline-none focus:border-amber-500 transition-all">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1.5">كلمة السر</label>
                    <input type="password" required placeholder="••••••••" 
                           class="w-full bg-slate-900/80 border border-slate-700 rounded-xl px-4 py-2.5 text-white placeholder-slate-500 focus:outline-none focus:border-amber-500 transition-all">
                </div>

                <button type="submit" class="w-full bg-amber-600 hover:bg-amber-700 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg shadow-amber-600/20 active:scale-[0.99] mt-2">
                    إنشاء حساب جديد ✨
                </button>
            </form>

        </div>
    </main>

    <!-- التذييل -->
    <footer class="text-center py-6 border-t border-slate-800 text-slate-500 text-sm">
        © 2026 منصة الدراسات الاجتماعية - جميع الحقوق محفوظة.
    </footer>

    <!-- السكربت البرمجي للتفاعل -->
    <script>
        function switchTab(tab) {
            const loginForm = document.getElementById('form-login');
            const registerForm = document.getElementById('form-register');
            const loginTab = document.getElementById('tab-login');
            const registerTab = document.getElementById('tab-register');

            if (tab === 'login') {
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
                
                loginTab.classList.add('text-amber-500', 'border-b-2', 'border-amber-500');
                loginTab.classList.remove('text-slate-400');
                
                registerTab.classList.remove('text-amber-500', 'border-b-2', 'border-amber-500');
                registerTab.classList.add('text-slate-400');
            } else {
                registerForm.classList.remove('hidden');
                loginForm.classList.add('hidden');
                
                registerTab.classList.add('text-amber-500', 'border-b-2', 'border-amber-500');
                registerTab.classList.remove('text-slate-400');
                
                loginTab.classList.remove('text-amber-500', 'border-b-2', 'border-amber-500');
                loginTab.classList.add('text-slate-400');
            }
        }

        function handleAuth(event, redirectUrl) {
            event.preventDefault();
            // توجيه تلقائي بعد التسجيل إلى لوحة التحكم
            window.location.href = redirectUrl;
        }
    </script>
</body>
</html>
