<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - منصة الدراسات الاجتماعية</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col justify-between">

    <!-- شريط الملاحة -->
    <nav class="flex justify-between items-center px-6 md:px-12 py-5 border-b border-slate-800">
        <a href="index.html" class="flex items-center space-x-3 space-x-reverse">
            <div class="w-10 h-10 bg-amber-600 rounded-lg flex items-center justify-center text-xl font-bold">🌍</div>
            <span class="text-xl font-bold tracking-wide">منصة <span class="text-amber-500">الدراسات الاجتماعية</span></span>
        </a>
        <a href="index.html" class="text-slate-400 hover:text-white transition-all text-sm font-medium">
            ← العودة للرئيسية
        </a>
    </nav>

    <!-- بطاقة تسجيل الدخول -->
    <main class="container mx-auto px-4 py-12 flex justify-center items-center flex-1">
        <div class="bg-slate-800/60 border border-slate-700/60 rounded-2xl p-8 w-full max-w-md shadow-2xl backdrop-blur-sm">
            
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-amber-600/20 text-amber-500 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-3 border border-amber-500/30">
                    🔑
                </div>
                <h2 class="text-2xl font-bold text-white">تسجيل دخول الطالب</h2>
                <p class="text-slate-400 text-sm mt-1">أدخل اسم المستخدم وكلمة السر الخاصة بك</p>
            </div>

            <!-- رسالة الخطأ عند إدخال بيانات خاطئة -->
            <div id="error-msg" class="hidden mb-4 p-3 bg-red-500/10 border border-red-500/50 rounded-xl text-red-400 text-sm text-center">
                اسم المستخدم أو كلمة السر غير صحيحة!
            </div>

            <!-- نموذج تسجيل الدخول -->
            <form id="form-login" class="space-y-5" onsubmit="validateStudentLogin(event)">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">اسم المستخدم / كود الطالب</label>
                    <input type="text" id="username" required placeholder="أدخل اسم المستخدم" 
                           class="w-full bg-slate-900/80 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-amber-500 transition-all">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">كلمة السر</label>
                    <input type="password" id="password" required placeholder="••••••••" 
                           class="w-full bg-slate-900/80 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-amber-500 transition-all">
                </div>

                <button type="submit" class="w-full bg-amber-600 hover:bg-amber-700 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg shadow-amber-600/20 active:scale-[0.99]">
                    دخول إلى المنصة 🚀
                </button>
            </form>

        </div>
    </main>

    <!-- التذييل -->
    <footer class="text-center py-6 border-t border-slate-800 text-slate-500 text-sm">
        © 2026 منصة الدراسات الاجتماعية - جميع الحقوق محفوظة.
    </footer>

    <!-- سكربت التحقق من الحسابات -->
    <script>
        // قائمة الطلاب المسموح لهم بالدخول (يمكنك تعديلها وإضافة أي عدد)
        const allowedStudents = [
            { username: "student1", pass: "123456", name: "أحمد محمد" },
            { username: "student2", pass: "123456", name: "محمود علي" },
            { username: "ehab", pass: "2026", name: "أستاذ إيهاب" }
        ];

        function validateStudentLogin(event) {
            event.preventDefault();

            const userInput = document.getElementById('username').value.trim();
            const passInput = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('error-msg');

            // البحث عن الطالب في القائمة
            const foundStudent = allowedStudents.find(
                s => s.username === userInput && s.pass === passInput
            );

            if (foundStudent) {
                // حفظ اسم الطالب في المتصفح لاستخدامه في لوحة التحكم
                localStorage.setItem('studentName', foundStudent.name);
                
                // التوجيه إلى لوحة التحكم
                window.location.href = 'dashboard.html';
            } else {
                // إظهار رسالة خطأ
                errorMsg.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
